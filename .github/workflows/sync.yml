name: Sync

on:
  schedule:
    # 15 minutes after josh/imdb-data runs
    # https://github.com/josh/imdb-data/blob/61b99a9/.github/workflows/sync.yml#L5C5-L5C32
    - cron: "30 0,5,19,23 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-slim
    concurrency: sync

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install dependencies
        run: uv sync

      - name: Sync
        run: |
          uv run imdb-plex-sync
        env:
          IMDB_WATCHLIST_URL: ${{ vars.IMDB_WATCHLIST_URL }}
          PLEX_TOKEN: ${{ secrets.PLEX_TOKEN }}
